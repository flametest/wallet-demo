services:
  mysql:
    image: mysql:8.0
    container_name: wallet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wallet
      MYSQL_USER: wallet
      MYSQL_PASSWORD: wallet
    ports:
      - "3306:3306"
    volumes:
      - wallet_mysql_data:/var/lib/mysql
      - ./migration/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet:
    build:
      dockerfile: Dockerfile
    image: wallet-demo:latest
    container_name: wallet-demo
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/config.docker.yaml:/app/deploy/config.yaml
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health-check" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  wallet_mysql_data:
